services:
  fandock:
    build: .
    container_name: fandock
    privileged: true          # required for sysfs PWM writes
    ports:
      - "${FANDOCK_PORT:-8080}:8080"
    volumes:
      - fandock_config:/app/config
      - ./frontend:/app/frontend
    environment:
      - FANDOCK_SECRET=change_me
      - FANDOCK_PORT=8080
    restart: unless-stopped

volumes:
  fandock_config:
